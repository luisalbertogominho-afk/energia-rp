<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Energia RP - 34 Postes</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

header {
    background: #0f172a;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    color: #38bdf8;
    font-weight: bold;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 15px;
}

.card {
    background: #111827;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 0 8px rgba(0,0,0,0.4);
}

.bar {
    width: 100%;
    height: 10px;
    background: #1f2937;
    border-radius: 5px;
    overflow: hidden;
    margin-top: 5px;
}

.fill {
    height: 100%;
    width: 50%;
    background: linear-gradient(90deg, #22c55e, #38bdf8);
    transition: 0.5s;
}

.status {
    font-size: 12px;
}

.green { color: #22c55e; }
.yellow { color: #facc15; }
.red { color: #ef4444; }

footer {
    text-align: center;
    padding: 10px;
    color: #94a3b8;
}
</style>
</head>

<body>

<header>⚡ CENTRAL ELÉTRICA RP - 34 POSTES</header>

<div class="grid" id="grid"></div>

<footer>Sistema RP Energia © 2026</footer>

<script>

const grid = document.getElementById("grid");

// criar 34 postes automaticamente
for (let i = 1; i <= 34; i++) {

    let power = Math.floor(Math.random() * 100);

    let status = "green";
    let text = "OK";

    if (power < 30) { status = "red"; text = "FALHA"; }
    else if (power < 70) { status = "yellow"; text = "OSCILANDO"; }

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <h3>Poste PT-${i.toString().padStart(3,'0')}</h3>
        <div class="status ${status}">${text}</div>
        <div class="bar">
            <div class="fill" style="width:${power}%"></div>
        </div>
        <small>${power}% energia</small>
    `;

    grid.appendChild(card);
}

// atualização em tempo real
setInterval(() => {

    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {

        let power = Math.floor(Math.random() * 100);

        let fill = card.querySelector(".fill");
        let status = card.querySelector(".status");
        let small = card.querySelector("small");

        fill.style.width = power + "%";
        small.innerText = power + "% energia";

        if (power < 30) {
            status.innerText = "FALHA";
            status.className = "status red";
        } 
        else if (power < 70) {
            status.innerText = "OSCILANDO";
            status.className = "status yellow";
        } 
        else {
            status.innerText = "OK";
            status.className = "status green";
        }

    });

}, 3000);

</script>

</body>
</html>
